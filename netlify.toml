[build]
  command = "npm run build"
  publish = "dist"

# Proxy API requests to Render backend (same-origin, no CORS issues)
[[redirects]]
  from = "/api/*"
  to = "https://hotel-management-6rw3.onrender.com/api/:splat"
  status = 200
  force = true

# SPA fallback — must come after API proxy
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
